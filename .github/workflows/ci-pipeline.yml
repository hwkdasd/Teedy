name: Teedy CI流水线
on:
  push:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build-test-job:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      # 仅编译+PMD检查，跳过完整打包规避快照依赖报错
      - name: PMD代码扫描 & 代码编译
        run: mvn pmd:pmd compile -B
      - name: 生成JavaDoc文档
        run: mvn javadoc:jar -B