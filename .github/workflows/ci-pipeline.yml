name: Teedy CI Pipeline
on:
  push:
    branches: [ master ]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4
      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: PMD代码质量检查
        run: mvn pmd:pmd
      - name: Maven打包生成Jar
        run: mvn clean package -DskipTests
      - name: 运行单元测试
        run: mvn test
      - name: 生成JavaDoc文档包
        run: mvn javadoc:jar